<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Изменение данных аккаунта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/account.css">
    <script>
        function toggleMenu() {
            document.getElementById("mobileMenu").classList.toggle("active");
        }
    </script>
</head>

<body>

<!-- ===== ШАПКА ===== -->
<div class="page-wrapper">
    <header>
        <a href="/" class="logo">Рука помощи</a>

        <nav class="desktop-nav">
            <a href="/not-secured/help">Нуждающиеся</a>
            <a href="/not-secured/volunteer">Волонтёры</a>
            <a href="/not-secured/benefit">Льготы</a>
        </nav>

        <a href="/api/v1/user/account" class="account-btn desktop-account">
            Аккаунт
        </a>

        <div class="burger" onclick="toggleMenu()">☰</div>

        <!-- мобильное меню -->
        <div id="mobileMenu" class="mobile-menu">
            <a href="/not-secured/help">Нуждающиеся</a>
            <a href="/not-secured/volunteer">Волонтёры</a>
            <a href="/not-secured/benefit">Льготы</a>
            <a href="/api/v1/user/account">Аккаунт</a>
        </div>
    </header>

<!-- ===== АККАУНТ ===== -->
    <main class="edit-page">
        <div class="edit-card">

            <h2 class="edit-title">Редактирование профиля</h2>
            <!-- ===== ОШИБКА ===== -->
            <div th:if="${errorMessage != null}" class="error-message">
                <span th:text="${errorMessage}"></span>
            </div>
            <form class="edit-form"
                  method="post"
                  th:action="@{/api/v1/user/account/edit}">

                <div class="edit-field">
                    <label>Имя</label>
                    <input type="text" name="firstName"
                           th:value="${user.firstName}" required>
                </div>

                <div class="edit-field">
                    <label>Фамилия</label>
                    <input type="text" name="lastName"
                           th:value="${user.lastName}" required>
                </div>

                <div class="edit-field">
                    <label>Телефон</label>
                    <input type="text" name="phoneNumber"
                           th:value="${user.phoneNumber}">
                </div>



                <button class="edit-submit">Сохранить</button>

            </form>

        </div>
    </main>


</div>
<!-- ===== ФУТЕР ===== -->
<footer>
    <div class="footer-content">

        <div class="footer-links">
            <a href="/api/v1/user/account">Аккаунт</a>
            <a href="/not-secured/login">Войти</a>
            <a href="/not-secured/registration">Зарегистрироваться</a>
        </div>

        <div class="footer-links">
            <a href="/api/v1/volunteer/form">Предложить помощь</a>
            <a href="/api/v1/help/form">Запросить помощь</a>
        </div>

        <div class="footer-links">
            <a>Контакты: rukapomoshiweb@gmail.com</a>
        </div>

    </div>
</footer>

</body>
</html>
