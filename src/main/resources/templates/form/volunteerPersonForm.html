<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка волонтёра</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/form.css">
    <script>
        function toggleMenu() {
            document.getElementById("mobileMenu").classList.toggle("active");
        }
    </script>
</head>

<body>

<header>
    <a href="/" class="logo">Рука помощи</a>

    <nav class="desktop-nav">
        <a href="/not-secured/help">Нуждающиеся</a>
        <a href="/not-secured/volunteer">Волонтёры</a>
        <a href="/not-secured/benefit">Льготы</a>
    </nav>

    <a href="/api/v1/user/account" class="account-btn desktop-account">
        Аккаунт
    </a>

    <div class="burger" onclick="toggleMenu()">☰</div>

    <!-- мобильное меню -->
    <div id="mobileMenu" class="mobile-menu">
        <a href="/not-secured/help">Нуждающиеся</a>
        <a href="/not-secured/volunteer">Волонтёры</a>
        <a href="/not-secured/benefit">Льготы</a>
        <a href="/api/v1/user/account">Аккаунт</a>
    </div>
</header>

<!-- ===== ФОРМА ===== -->
<div class="main-content">
    <div class="f-card">
        <div class="f-card">
            <div th:if="${error}">
                <h2 th:text="${error}"></h2>
                <a href="/not-secured/volunteer">← Назад к списку</a>
            </div>
    <h1>Предложение помощи</h1>

    <div class="row">
        <label>Полное имя</label>
        <div th:text="${volunteer.fullName}"></div>
    </div>

    <div class="row">
        <label>Возраст</label>
        <div th:text="${volunteer.age}"></div>
    </div>

    <div class="row">
        <label>Телефон</label>
        <div th:text="${volunteer.contactPhone}"></div>
    </div>

    <div class="row">
        <label>Другие контакты</label>
        <div th:text="${volunteer.otherContact}"></div>
    </div>

    <div class="row">
        <label>Город</label>
        <div th:text="${volunteer.city}"></div>
    </div>

    <div class="row">
        <label>Опыт волонтёрства</label>
        <div th:text="${volunteer.volunteerExperience}"></div>
    </div>

    <div class="row">
        <label>Доступность</label>
        <div th:text="${volunteer.availability}"></div>
    </div>

    <div class="row">
        <label>Предпочтительная группа</label>
        <div th:text="${volunteer.preferredGroup}"></div>
    </div>

    <div class="row">
        <label>Какая помощь доступна</label>
        <div th:text="${volunteer.availableHelp}"></div>
    </div>

    <div class="row">
        <label>Дополнительная информация</label>
        <div th:text="${volunteer.additionalInformation}"></div>
    </div>

    <div class="row">
        <label>Создано</label>
        <div th:text="${#temporals.format(volunteer.createdAt,'dd.MM.yyyy HH:mm')}"></div>
    </div>

    <div class="row">
        <label>Обновлено</label>
        <div th:text="${#temporals.format(volunteer.updatedAt,'dd.MM.yyyy HH:mm')}"></div>
    </div>
    </div>
    </div>
</div>

<!-- ===== ФУТЕР ===== -->
<footer>
    <div class="footer-content">
        <div class="footer-links">
            <a href="/api/v1/user/account">Аккаунт</a>
            <a href="/not-secured/login">Войти</a>
            <a href="/not-secured/registration">Зарегистрироваться</a>
        </div>

        <div class="footer-links">
            <a href="/api/v1/volunteer/form">Предложить помощь</a>
            <a href="/api/v1/help/form">Запросить помощь</a>
        </div>

        <div class="footer-links">
            <a>Контакты: rukapomoshiweb@gmail.com</a>
        </div>
    </div>
</footer>

</body>
</html>
